```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Atlas MVP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; margin:0; display:flex; background:#f5f5f5; }
aside { width:220px; background:#1e293b; color:white; padding:20px; }
main { flex:1; padding:30px; }

button { padding:10px 16px; border:none; background:#111; color:white; cursor:pointer; }

table { width:100%; margin-top:20px; background:white; border-collapse: collapse; }
td, th { padding:12px; border-bottom:1px solid #eee; }

.card { background:white; padding:20px; margin-bottom:20px; }

</style>
</head>

<body>

<aside>
<h2>Atlas</h2>
<p onclick="show('dashboard')">Dashboard</p>
<p onclick="show('invoices')">Invoices</p>
</aside>

<main>

<!-- DASHBOARD -->
<div id="dashboard">
<h1>Dashboard</h1>

<div class="card">
<h3>Total invoices</h3>
<div id="total"></div>
</div>

</div>

<!-- INVOICES -->
<div id="invoices" style="display:none;">
<h1>Invoices</h1>

<button onclick="createInvoice()">+ New Invoice</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Amount</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

</main>

<script>

// DB
let db = JSON.parse(localStorage.getItem("atlas") || '{"invoices":[]}');

function save(){
  localStorage.setItem("atlas", JSON.stringify(db));
}

// NAV
function show(page){
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("invoices").style.display = "none";
  document.getElementById(page).style.display = "block";
  render();
}

// CREATE
function createInvoice(){
  const customer = prompt("Customer?");
  const amount = prompt("Amount?");
  if(!customer || !amount) return;

  db.invoices.push({
    id: "INV-"+Math.floor(Math.random()*10000),
    customer,
    amount
  });

  save();
  render();
}

// RENDER
function render(){

  // dashboard
  document.getElementById("total").innerText = db.invoices.length;

  // table
  const table = document.getElementById("table");
  table.innerHTML = "";

  db.invoices.forEach(i=>{
    table.innerHTML += `
    <tr>
      <td>${i.id}</td>
      <td>${i.customer}</td>
      <td>${i.amount}</td>
    </tr>`;
  });

}

render();

</script>

</body>
</html>
```
